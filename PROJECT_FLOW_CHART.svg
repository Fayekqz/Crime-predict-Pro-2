<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions for arrows and markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" />

  <!-- Title -->
  <text x="600" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1e293b" text-anchor="middle">
    CrimePredictPro Project Architecture Flow Chart
  </text>
  <text x="600" y="70" font-family="Arial, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">
    Comprehensive End-to-End Data Flow & System Architecture
  </text>

  <!-- Group: 1. Data Ingestion -->
  <rect x="50" y="100" width="220" height="600" rx="10" fill="#e2e8f0" stroke="#94a3b8" stroke-dasharray="5,5" />
  <text x="160" y="125" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">1. Data Ingestion</text>
  
  <rect x="70" y="150" width="180" height="60" rx="8" fill="#ffffff" stroke="#0ea5e9" filter="url(#shadow)" />
  <text x="160" y="185" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0c4a6e" text-anchor="middle">Historical Crime CSV</text>
  
  <rect x="70" y="240" width="180" height="60" rx="8" fill="#ffffff" stroke="#0ea5e9" filter="url(#shadow)" />
  <text x="160" y="275" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0c4a6e" text-anchor="middle">Data Upload Interface</text>

  <!-- Group: 2. Storage & Processing -->
  <rect x="320" y="100" width="260" height="600" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-dasharray="5,5" />
  <text x="450" y="125" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">2. Data Pipeline</text>

  <rect x="360" y="150" width="180" height="60" rx="8" fill="#fef3c7" stroke="#d97706" filter="url(#shadow)" />
  <text x="450" y="185" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400e" text-anchor="middle">LocalStorage Persistence</text>

  <rect x="360" y="240" width="180" height="60" rx="8" fill="#dcfce7" stroke="#16a34a" filter="url(#shadow)" />
  <text x="450" y="275" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#166534" text-anchor="middle">Central Filtering Engine</text>

  <rect x="360" y="330" width="180" height="60" rx="8" fill="#dcfce7" stroke="#16a34a" filter="url(#shadow)" />
  <text x="450" y="365" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#166534" text-anchor="middle">Metrics Computation</text>

  <rect x="360" y="420" width="180" height="60" rx="8" fill="#dcfce7" stroke="#16a34a" filter="url(#shadow)" />
  <text x="450" y="455" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#166534" text-anchor="middle">LSTM Prediction Engine</text>

  <!-- Group: 3. Presentation Layer -->
  <rect x="630" y="100" width="240" height="600" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-dasharray="5,5" />
  <text x="750" y="125" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">3. Presentation Layer</text>

  <rect x="660" y="150" width="180" height="60" rx="8" fill="#ffffff" stroke="#1e40af" filter="url(#shadow)" />
  <text x="750" y="185" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e3a8a" text-anchor="middle">Main Dashboard Cards</text>

  <rect x="660" y="240" width="180" height="60" rx="8" fill="#ffffff" stroke="#1e40af" filter="url(#shadow)" />
  <text x="750" y="275" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e3a8a" text-anchor="middle">Trends & Distribution Charts</text>

  <rect x="660" y="330" width="180" height="60" rx="8" fill="#ffffff" stroke="#1e40af" filter="url(#shadow)" />
  <text x="750" y="365" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e3a8a" text-anchor="middle">Leaflet Map Analysis</text>

  <rect x="660" y="420" width="180" height="60" rx="8" fill="#ffffff" stroke="#1e40af" filter="url(#shadow)" />
  <text x="750" y="455" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e3a8a" text-anchor="middle">Prediction Interface</text>

  <!-- Group: 4. MLOps & Monitoring -->
  <rect x="920" y="100" width="230" height="600" rx="10" fill="#fff1f2" stroke="#fb7185" stroke-dasharray="5,5" />
  <text x="1035" y="125" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#be123c" text-anchor="middle">4. MLOps Layer</text>

  <rect x="945" y="150" width="180" height="60" rx="8" fill="#ffffff" stroke="#be185d" filter="url(#shadow)" />
  <text x="1035" y="185" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#9d174d" text-anchor="middle">MLflow Integration</text>

  <rect x="945" y="240" width="180" height="60" rx="8" fill="#ffffff" stroke="#be185d" filter="url(#shadow)" />
  <text x="1035" y="275" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#9d174d" text-anchor="middle">Model Registry</text>

  <rect x="945" y="330" width="180" height="60" rx="8" fill="#ffffff" stroke="#be185d" filter="url(#shadow)" />
  <text x="1035" y="365" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#9d174d" text-anchor="middle">Deployment Monitor</text>

  <!-- Arrows -->
  <line x1="250" y1="180" x2="350" y2="180" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="160" y1="210" x2="160" y2="230" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="250" y1="270" x2="350" y2="270" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <line x1="540" y1="270" x2="650" y2="200" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="540" y1="270" x2="650" y2="270" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="540" y1="360" x2="650" y2="360" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="540" y1="450" x2="650" y2="450" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" />

  <line x1="840" y1="450" x2="935" y2="180" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <!-- User Action Section at Bottom -->
  <rect x="400" y="650" width="400" height="80" rx="10" fill="#1e293b" stroke="#0f172a" filter="url(#shadow)" />
  <text x="600" y="685" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">User Action: Interactive Analytics & Export</text>
  <text x="600" y="710" font-family="Arial, sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">CSV / PNG / PDF Generation</text>

  <line x1="600" y1="500" x2="600" y2="640" stroke="#1e293b" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrowhead)" />

</svg>
